name: Deploy Sites

on:
  push:
    branches: [apex]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: "hosting"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Apex ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Apex dependencies
        working-directory: ./apex
        run: npm ci

      - name: Build Apex site
        working-directory: ./apex
        run: npm run build

      # --- Hunny Docusaurus ---
      - name: Install Hunny Docusaurus dependencies
        working-directory: ./hunny/home_page
        run: npm ci

      - name: Build Hunny Docusaurus site
        working-directory: ./hunny/home_page
        run: npm run build

      # --- Hunny Flutter Viewer ---
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Hunny Flutter viewer
        working-directory: ./hunny/viewer_app
        run: flutter build web --base-href=/viewer/

      # --- Assemble hunny/dist ---
      - name: Assemble Hunny dist
        run: |
          mkdir -p hunny/dist
          cp -r hunny/home_page/build/* hunny/dist/
          cp -r hunny/viewer_app/build/web hunny/dist/viewer

      # --- Deploy ---
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project=rubydog-sites --non-interactive
