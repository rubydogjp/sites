name: Deploy Notes

on:
  push:
    branches: [notes]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: "hosting-notes"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone flutter_note source
        run: git clone --depth 1 https://github.com/rbdog/flutter_note.git notes/flutter_note

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: ./notes/flutter_note
        run: flutter pub upgrade google_fonts

      - name: Build Flutter web
        working-directory: ./notes/flutter_note
        run: flutter build web --base-href=/

      - name: Stage build
        run: |
          mkdir -p _build/flutter-note
          cp -r notes/flutter_note/build/web/* _build/flutter-note/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting:flutter-note --project=rubydog-sites --non-interactive
