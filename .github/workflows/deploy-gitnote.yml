name: Deploy Git Note

on:
  push:
    branches: [gitnote]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: "hosting-gitnote"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./gitnote
        run: npm ci

      - name: Build
        working-directory: ./gitnote
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1042076784714/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions@rubydog-sites.iam.gserviceaccount.com

      - name: Deploy to Firebase Hosting
        run: |
          export FIREBASE_TOKEN=$(gcloud auth print-access-token)
          npx firebase-tools deploy --only hosting:gitnote --project=rubydog-sites --non-interactive
