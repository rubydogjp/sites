name: Deploy Apex

on:
  push:
    branches: [apex]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: "hosting-apex"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Apex site ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./apex
        run: npm ci

      - name: Build site
        working-directory: ./apex
        run: npm run build

      # --- Flutter setup (shared by notes, hunny viewer & packages) ---
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # --- Notes (flutter_note) for /notes ---
      - name: Clone flutter_note source
        run: git clone --depth 1 https://github.com/rbdog/flutter_note.git notes/flutter_note

      - name: Install Flutter Note dependencies
        working-directory: ./notes/flutter_note
        run: flutter pub get

      - name: Build Flutter Note for /notes
        working-directory: ./notes/flutter_note
        run: flutter build web --base-href=/notes/

      - name: Copy Flutter Note into apex dist
        run: cp -r notes/flutter_note/build/web apex/dist/notes

      # --- Hunny for /hunny ---
      - name: Install Docusaurus dependencies
        working-directory: ./hunny/home_page
        run: npm ci

      - name: Build Docusaurus for /hunny
        working-directory: ./hunny/home_page
        env:
          SITE_URL: https://rubydog.jp
          BASE_URL: /hunny/
        run: npm run build

      - name: Install Hunny viewer dependencies
        working-directory: ./hunny/viewer_app
        run: flutter pub get

      - name: Build Hunny viewer for /hunny/viewer
        working-directory: ./hunny/viewer_app
        run: flutter build web --base-href=/hunny/viewer/

      - name: Copy Hunny into apex dist
        run: |
          cp -r hunny/home_page/build apex/dist/hunny
          cp -r hunny/viewer_app/build/web apex/dist/hunny/viewer

      # --- Packages for /packages ---
      - name: Install Packages dependencies
        working-directory: ./packages
        run: flutter pub get

      - name: Build Packages for /packages
        working-directory: ./packages
        run: flutter build web --base-href=/packages/

      - name: Copy Packages into apex dist
        run: cp -r packages/build/web apex/dist/packages

      # --- Deploy ---
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting:apex --project=rubydog-sites --non-interactive
